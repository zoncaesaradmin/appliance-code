apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "appliance-registry.fullname" . }}-config
  namespace: {{ include "appliance-registry.namespace" . }}
  labels:
    {{- include "appliance-registry.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "distSpecVersion": "1.1.1",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "dedupe": true,
        "gc": false
      },
      "http": {
        "address": "0.0.0.0",
        "port": {{ .Values.service.port }},
        "auth": {
          "bearer": {
            "realm": {{ .Values.auth.realm | quote }},
            "service": {{ .Values.auth.service | quote }},
            "cert": "/etc/zot/auth/registry-public.pem"
          }
        }
      },
      "log": {
        "level": "info",
        "output": "/var/log/zot/application.log"
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "appliance-registry.fullname" . }}-data
  namespace: {{ include "appliance-registry.namespace" . }}
  labels:
    {{- include "appliance-registry.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "appliance-registry.fullname" . }}
  namespace: {{ include "appliance-registry.namespace" . }}
  labels:
    {{- include "appliance-registry.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "appliance-registry.selectorLabels" . | nindent 4 }}
  ports:
    - name: registry
      port: {{ .Values.service.port }}
      targetPort: registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appliance-registry.fullname" . }}
  namespace: {{ include "appliance-registry.namespace" . }}
  labels:
    {{- include "appliance-registry.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "appliance-registry.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "appliance-registry.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.logs.prepare.enabled }}
      initContainers:
        - name: prepare-log-dir
          image: {{ .Values.logs.prepare.image }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "mkdir -p /data/zon/logs/zot && chown 10003:20000 /data/zon/logs/zot && chmod 2755 /data/zon/logs/zot"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
              drop: ["ALL"]
          volumeMounts:
            - name: logs
              mountPath: /data/zon/logs/zot
      {{- end }}
      containers:
        - name: zot
          image: {{ include "appliance-registry.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - name: registry
              containerPort: {{ .Values.service.port }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket: {port: registry}
          readinessProbe:
            tcpSocket: {port: registry}
          startupProbe:
            tcpSocket: {port: registry}
            failureThreshold: {{ .Values.probes.startupFailureThreshold }}
            periodSeconds: {{ .Values.probes.startupPeriodSeconds }}
          volumeMounts:
            - {name: config, mountPath: /etc/zot, readOnly: true}
            - {name: auth-key, mountPath: /etc/zot/auth, readOnly: true}
            - {name: data, mountPath: /var/lib/registry}
            - {name: logs, mountPath: /var/log/zot}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: config
          configMap:
            name: {{ include "appliance-registry.fullname" . }}-config
        - name: auth-key
          secret:
            secretName: {{ .Values.auth.publicKeySecretName }}
            items:
              - key: {{ .Values.auth.publicKeySecretKey }}
                path: registry-public.pem
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "appliance-registry.fullname" . }}-data
        - name: logs
          hostPath:
            path: {{ .Values.logs.hostPath }}
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "appliance-registry.fullname" . }}-default-deny
  namespace: {{ include "appliance-registry.namespace" . }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "appliance-registry.fullname" . }}-allow
  namespace: {{ include "appliance-registry.namespace" . }}
spec:
  podSelector:
    matchLabels:
      {{- include "appliance-registry.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.controlPlaneNamespaceLabel | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.controlPlanePodLabels | nindent 14 }}
      ports:
        - {protocol: TCP, port: {{ .Values.service.port }}}
    {{- if .Values.networkPolicy.traefikNamespaceLabel }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.traefikNamespaceLabel | nindent 14 }}
      ports:
        - {protocol: TCP, port: {{ .Values.service.port }}}
    {{- end }}
  # Zot has no runtime egress dependency. Response traffic is statefully allowed.
  egress: []
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "appliance-registry.fullname" . }}
  namespace: {{ include "appliance-registry.namespace" . }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    - kind: Rule
      match: {{ printf "%sPathPrefix(`/v2`)" (ternary (printf "Host(`%s`) && " .Values.ingress.host) "" (ne .Values.ingress.host "")) | quote }}
      services:
        - name: {{ include "appliance-registry.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}

replicaCount: 1

image:
  repository: registry.local/zot
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

namespace:
  create: false
  name: appliance-system

service:
  port: 5000

persistence:
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 100Gi

logs:
  hostPath: /data/zon/logs/zot
  prepare:
    enabled: false
    image: registry.local/busybox:bundled

auth:
  # zonctl replaces this portable placeholder with the installed appliance
  # origin. OCI clients require an absolute bearer-token realm.
  realm: https://appliance.example.internal/api/v1/registry/token
  service: zot
  publicKeySecretName: appliance-keys
  publicKeySecretKey: registry_ed25519_public.pem

ingress:
  enabled: true
  entryPoints: [websecure]
  host: ""
  tlsSecretName: appliance-tls

networkPolicy:
  enabled: true
  traefikNamespaceLabel: {}
  controlPlanePodLabels:
    app.kubernetes.io/name: appliance-control-plane

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10003
  runAsGroup: 10003
  fsGroup: 20000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  path: /v2/
  startupFailureThreshold: 30
  startupPeriodSeconds: 2

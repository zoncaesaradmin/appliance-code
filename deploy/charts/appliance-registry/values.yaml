replicaCount: 1

image:
  repository: registry.local/zot
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

namespace:
  create: false
  name: registry

service:
  port: 5000

persistence:
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 100Gi

logs:
  # Host-visible service log directory. zonctl prepares ownership before
  # Helm apply; the chart mounts this path directly (not the parent tree).
  hostPath: /data/zon/logs/zot
  prepare:
    enabled: false
    image: registry.local/busybox:bundled

auth:
  # zonctl replaces this portable placeholder with the installed appliance
  # origin. OCI clients require an absolute bearer-token realm.
  realm: https://appliance.example.internal/api/v1/registry/token
  service: zot
  # Public-only verification Secret published by zonctl; never mount appliance-keys.
  publicKeySecretName: appliance-registry-verification-key
  publicKeySecretKey: registry_ed25519_public.pem

ingress:
  enabled: true
  entryPoints: [websecure]
  host: ""
  tlsSecretName: appliance-tls

networkPolicy:
  enabled: true
  traefikNamespaceLabel: {}
  controlPlaneNamespaceLabel:
    kubernetes.io/metadata.name: appliance-system
  controlPlanePodLabels:
    app.kubernetes.io/name: appliance-control-plane

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10003
  runAsGroup: 10003
  fsGroup: 20000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 1Gi

probes:
  # OCI token auth commonly challenges unauthenticated /v2/ requests with 401.
  # Use a plain TCP probe so auth configuration does not flap pod health.
  startupFailureThreshold: 30
  startupPeriodSeconds: 2

# Pinned so every name this chart derives (pod names, ServiceAccount
# names, the ConfigMap, etc.) is a clean "argo-workflows-*" instead of
# the doubled "argo-workflows-argo-workflows-*" that falls out of the
# default "<release-name>-<chart-name>" formula whenever the release is
# installed as "argo-workflows" (which zonctl always does). Several
# derived names — notably the executor ServiceAccount — are referenced
# by exact string match from appliance-code's control plane
# (WorkflowExecutorServiceAccount), so this is not just cosmetic.
fullnameOverride: "argo-workflows"

namespace:
  create: true
  workflows: workflows
  builds: appliance-builds

image:
  controller:
    repository: localhost/appliance-argo-controller
    tag: "" # defaults to .Chart.AppVersion; releases should pin by digest
    digest: ""
    pullPolicy: IfNotPresent
  executor:
    repository: quay.io/argoproj/argoexec
    tag: "" # defaults to .Chart.AppVersion; releases should pin by digest
    digest: ""

controller:
  replicas: 1
  logLevel: info
  managedNamespace: ""
  extraArgs: []

config:
  instanceID: appliance
  containerRuntimeExecutor: emissary
  archiveLogs: false

serviceAccount:
  controller:
    create: true
    name: ""
  executor:
    create: true
    name: ""

rbac:
  create: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 20000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

networkPolicy:
  enabled: false

{{- if .Values.serviceAccount.controller.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "argo-workflows.controllerServiceAccountName" . }}
  namespace: {{ include "argo-workflows.workflowsNamespace" . }}
  labels:
    {{- include "argo-workflows.labels" . | nindent 4 }}
automountServiceAccountToken: true
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argo-workflows.fullname" . }}
  namespace: {{ include "argo-workflows.workflowsNamespace" . }}
  labels:
    {{- include "argo-workflows.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "argo-workflows.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "argo-workflows.labels" . | nindent 8 }}
        {{- include "argo-workflows.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "argo-workflows.controllerServiceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: prepare-log-dir
          image: alpine:3.24.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - mkdir -p /data/zon/logs/argo-controller && chown 65532:20000 /data/zon/logs/argo-controller && chmod 2770 /data/zon/logs/argo-controller
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
              drop: ["ALL"]
          volumeMounts:
            - name: appliance-logs
              mountPath: /data/zon/logs
      containers:
        - name: workflow-controller
          image: {{ include "argo-workflows.image" (dict "image" .Values.image.controller "Chart" .Chart) | quote }}
          imagePullPolicy: {{ .Values.image.controller.pullPolicy }}
          args:
            - --configmap
            - {{ include "argo-workflows.configMapName" . }}
            - --executor-image
            - {{ include "argo-workflows.image" (dict "image" .Values.image.executor "Chart" .Chart) | quote }}
            - --namespaced
            - --managed-namespace
            - {{ include "argo-workflows.managedNamespace" . }}
            - --loglevel
            - {{ .Values.controller.logLevel }}
            {{- range .Values.controller.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: LEADER_ELECTION_IDENTITY
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: appliance-logs
              mountPath: /data/zon/logs
      volumes:
        - name: appliance-logs
          hostPath:
            path: /data/zon/logs
            type: DirectoryOrCreate

{{- if .Values.serviceAccount.executor.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "appliance-argo-workflows.executorServiceAccountName" . }}
  namespace: {{ include "appliance-argo-workflows.buildsNamespace" . }}
  labels:
    {{- include "appliance-argo-workflows.labels" . | nindent 4 }}
automountServiceAccountToken: true
{{- end }}

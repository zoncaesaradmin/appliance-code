{{- if eq (include "appliance-control-plane.argoWorkflowEnabled" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "appliance-control-plane.fullname" . }}-workflows
  namespace: {{ include "appliance-control-plane.argoWorkflowNamespace" . }}
  labels:
    {{- include "appliance-control-plane.labels" . | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "appliance-control-plane.fullname" . }}-workflows
  namespace: {{ include "appliance-control-plane.argoWorkflowNamespace" . }}
  labels:
    {{- include "appliance-control-plane.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "appliance-control-plane.serviceAccountName" . }}
    namespace: {{ include "appliance-control-plane.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "appliance-control-plane.fullname" . }}-workflows
{{- end }}

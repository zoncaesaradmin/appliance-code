{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "appliance-control-plane.fullname" . }}-default-deny
  namespace: {{ include "appliance-control-plane.namespace" . }}
  labels:
    {{- include "appliance-control-plane.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "appliance-control-plane.fullname" . }}-allow
  namespace: {{ include "appliance-control-plane.namespace" . }}
  labels:
    {{- include "appliance-control-plane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "appliance-control-plane.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.traefikNamespaceLabel }}
    # Only Traefik may reach the public port; the internal listener is never
    # granted an ingress rule reaching outside this namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.traefikNamespaceLabel | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.publicPort }}
    {{- end }}
    # Same-namespace access to the internal listener, for future
    # in-namespace diagnostics/support-bundle jobs.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.internalPort }}
    {{- if .Values.ui.enabled }}
    # The UI pod calls the control-plane API and internal metadata/health
    # endpoints over same-namespace services.
    - from:
        - podSelector:
            matchLabels:
              {{- include "appliance-control-plane.uiSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.publicPort }}
        - protocol: TCP
          port: {{ .Values.service.internalPort }}
    {{- end }}
  egress:
    # Artifact catalog and dependency-health calls go only to the dedicated
    # registry pod and port.
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.registryNamespaceLabel | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.registryPodLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.registryPort }}
    # DNS is required for the internal registry Service lookup.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- if .Values.ui.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "appliance-control-plane.uiServiceName" . }}-allow
  namespace: {{ include "appliance-control-plane.namespace" . }}
  labels:
    {{- include "appliance-control-plane.uiLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "appliance-control-plane.uiSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.traefikNamespaceLabel }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.traefikNamespaceLabel | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ui.service.port }}
    {{- end }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "appliance-control-plane.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.publicPort }}
        - protocol: TCP
          port: {{ .Values.service.internalPort }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}

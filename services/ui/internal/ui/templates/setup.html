{{define "setup.html"}}
{{template "layout-start" .}}
<section class="hero-card">
  <p class="eyebrow">First-time setup</p>
  <h1>Create the first administrator</h1>
  <p class="muted">This appliance has not been initialized yet. Create the first administrator to continue.</p>
  {{if .Error}}
  <article class="notice error" role="alert">{{.Error}}</article>
  {{end}}
  <form method="post" action="/setup">
    <label>
      Username
      <input name="username" autocomplete="username" value="admin" required autofocus>
    </label>
    <label>
      Display name
      <input name="display_name" autocomplete="name" placeholder="Administrator">
    </label>
    <label>
      Password
      <input name="password" type="password" autocomplete="new-password" required>
    </label>
    <label>
      Confirm password
      <input name="password_confirm" type="password" autocomplete="new-password" required>
    </label>
    <button type="submit">Create administrator</button>
  </form>
</section>
{{template "layout-end" .}}
{{end}}
